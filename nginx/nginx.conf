events {}

http {

    limit_req_zone $binary_remote_addr zone=todo_limit:10m rate=5r/s;

    upstream todo_service {
        server todo_service:8001;
    }

    upstream gateway_service {
        server gateway_service:8000;
    }

    server {
        listen 80;

        location /api/todos/ {
            limit_req zone=todo_limit burst=10 nodelay;

            proxy_set_header Host localhost;   # ✅ FIXED
            proxy_pass http://todo_service;
        }

        location / {
            proxy_set_header Host localhost;   # ✅ FIXED
            proxy_pass http://gateway_service;
        }
    }
}